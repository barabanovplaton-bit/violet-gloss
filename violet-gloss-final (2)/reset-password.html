<!DOCTYPE html>
<html lang="ru">
<head>
    <script>
(function(){
    var t=localStorage.getItem('vg-theme');
    if(t==='dark'){
        document.documentElement.setAttribute('data-theme','dark');
    } else if(t==='system'){
        if(window.matchMedia('(prefers-color-scheme:dark)').matches){
            document.documentElement.setAttribute('data-theme','dark');
        }
    }
})();
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля — Violet Gloss</title>
    <meta name="description" content="Восстановите пароль от аккаунта Violet Gloss.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="dns-prefetch" href="https://www.gstatic.com">
    <link rel="stylesheet" href="styles/style.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--milk);
            padding: 20px;
        }
        .auth-card {
            background: var(--white);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .auth-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-gray);
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            margin-bottom: 16px;
            transition: color 0.2s;
        }
        .auth-back:hover {
            color: var(--accent);
        }
        .auth-logo {
            font-family: 'Manrope', sans-serif;
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
            color: var(--text-dark);
            text-decoration: none;
            display: block;
        }
        .auth-logo span { color: #FF5A00; }
        .auth-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--text-gray);
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-form .form-group {
            margin-bottom: 20px;
        }
        .auth-form label {
            display: block;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        .auth-form input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #E0E0E0;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            color: var(--text-dark);
            background: var(--milk);
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .auth-form input:focus {
            outline: none;
            border-color: #FF5A00;
            background: var(--white);
        }
        .btn-auth {
            width: 100%;
            padding: 14px;
            background: #FF5A00;
            color: #FFF;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn-auth:hover { background: #E65000; }
        .btn-auth:disabled { background: #CCC; cursor: not-allowed; }
        .auth-error {
            background: #FFF0F0;
            color: #D32F2F;
            padding: 12px 16px;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .auth-success {
            background: #F0FFF4;
            color: #2E7D32;
            padding: 16px 20px;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .auth-success h4 {
            font-weight: 600;
            margin-bottom: 6px;
        }
        .auth-success p {
            color: #4CAF50;
            font-size: 13px;
        }
        .auth-links {
            text-align: center;
            margin-top: 24px;
        }
        .auth-links a {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #FF5A00;
            text-decoration: none;
        }
        .auth-links a:hover { text-decoration: underline; }
        .auth-links p {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--text-gray);
            margin-bottom: 4px;
        }
        /* Dark theme overrides */
        [data-theme="dark"] .auth-form input {
            background: #252525;
            border-color: #444;
            color: var(--text-dark);
        }
        [data-theme="dark"] .auth-form input:focus {
            background: #2a2a2a;
        }
        [data-theme="dark"] .auth-card {
            background: #1E1E1E;
        }
        [data-theme="dark"] .auth-success {
            background: rgba(46, 125, 50, 0.15);
            color: #81C784;
        }
        [data-theme="dark"] .auth-success p {
            color: #81C784;
        }
        [data-theme="dark"] .auth-error {
            background: rgba(211, 47, 47, 0.15);
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <a href="index.html" class="auth-back">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                <span data-i18n="reset.home">На главную</span>
            </a>
            <a href="index.html" class="auth-logo">Violet <span>Gloss</span></a>
            <p class="auth-subtitle" data-i18n="reset.title">Восстановление пароля</p>

            <div class="auth-error" id="reset-error"></div>

            <div class="auth-success" id="reset-success">
                <h4 data-i18n="reset.success.title">Письмо отправлено!</h4>
                <p data-i18n="reset.success.desc">Мы отправили инструкцию по восстановлению пароля на ваш email. Проверьте входящие и папку «Спам».</p>
            </div>

            <form class="auth-form" id="reset-form">
                <div class="form-group">
                    <label for="reset-email" data-i18n="reset.email">Email</label>
                    <input type="email" id="reset-email" placeholder="Введите ваш email" data-i18n-ph="reset.email.ph" required>
                </div>
                <button type="submit" class="btn-auth" id="btn-reset" data-i18n="reset.submit">Отправить ссылку</button>
            </form>

            <div class="auth-links">
                <p><a href="login.html" data-i18n="reset.back">Вернуться к входу</a></p>
                <p><span data-i18n="login.no.account">Нет аккаунта?</span> <a href="register.html" data-i18n="login.register">Зарегистрироваться</a></p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBk8SHgxCOYjIrFkixIFAoy_BRpWsIUd7w",
            authDomain: "violet-gloss.firebaseapp.com",
            projectId: "violet-gloss",
            storageBucket: "violet-gloss.firebasestorage.app",
            messagingSenderId: "330589029963",
            appId: "1:330589029963:web:a4947df92909e6d045afce"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const resetForm = document.getElementById('reset-form');
        const resetError = document.getElementById('reset-error');
        const resetSuccess = document.getElementById('reset-success');
        const btnReset = document.getElementById('btn-reset');

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            resetError.style.display = 'none';
            resetSuccess.style.display = 'none';
            btnReset.disabled = true;
            btnReset.textContent = window.t ? window.t('reset.sending') : 'Отправка...';

            const email = document.getElementById('reset-email').value;

            try {
                await auth.sendPasswordResetEmail(email);
                resetForm.style.display = 'none';
                resetSuccess.style.display = 'block';
            } catch (error) {
                let message = window.t ? window.t('reset.error.general') : 'Произошла ошибка. Попробуйте ещё раз.';
                if (error.code === 'auth/user-not-found') {
                    message = window.t ? window.t('reset.error.user_not_found') : 'Пользователь с таким email не найден';
                } else if (error.code === 'auth/invalid-email') {
                    message = window.t ? window.t('reset.error.invalid_email') : 'Некорректный email';
                } else if (error.code === 'auth/too-many-requests') {
                    message = window.t ? window.t('error.tooManyRequests') : 'Слишком много попыток. Попробуйте позже';
                }
                resetError.textContent = message;
                resetError.style.display = 'block';
                btnReset.disabled = false;
                btnReset.textContent = window.t ? window.t('reset.submit') : 'Отправить ссылку';
            }
        });
    </script>

    <script>
document.addEventListener('DOMContentLoaded', function() {
    window.initCustomSelects && window.initCustomSelects();
});
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <script>
(function(){
    var t=localStorage.getItem('vg-theme');
    if(t==='dark'){
        document.documentElement.setAttribute('data-theme','dark');
    } else if(t==='system'){
        if(window.matchMedia('(prefers-color-scheme:dark)').matches){
            document.documentElement.setAttribute('data-theme','dark');
        }
    }
})();
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена — Violet Gloss</title>
    <meta name="description" content="Страница не найдена. Вернитесь на главную страницу Violet Gloss.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <style>
        .page-404 {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FAFAFA;
            padding: 20px;
            text-align: center;
        }
        .page-404-content {
            max-width: 500px;
        }
        .page-404-number {
            font-family: 'Manrope', sans-serif;

            color: #FF5A00;
            line-height: 1;
            margin-bottom: 16px;

        .page-404-title {

            margin-bottom: 12px;

            font-family: 'Inter', sans-serif;

        }
        .page-404 .btn-primary {
            display: inline-block;

            color: #FFF;

            font-family: 'Inter', sans-serif;

            text-decoration: none;
            transition: background 0.2s;
        }
        .page-404 .btn-primary:hover {

        }
    </style>
<script>setTimeout(function(){var p=document.getElementById("preloader");if(p){p.style.opacity="0";setTimeout(function(){p.remove()},500)}},3000);</script>
</head>
<body>

            <p class="page-404-desc" data-i18n="404.desc">К сожалению, запрашиваемая страница не существует или была перемещена. Вернитесь на главную страницу, чтобы продолжить.</p>
            <a href="index.html" class="btn-primary" data-i18n="btn.home">На главную</a>

    </div>

</html>
